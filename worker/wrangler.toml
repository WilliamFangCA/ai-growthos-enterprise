name = "ai-growthos-api"
main = "src/index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "growthos"
database_id = "REPLACE_WITH_D1_ID"

[vars]
GLM_BASE_URL = "https://open.bigmodel.cn/api/anthropic/v1"

# Secrets (set via: wrangler secret put GLM_API_KEY)
# GLM_API_KEY
# ANTHROPIC_API_KEY

[[routes]]
pattern = "api.growthos.ai/*"
zone_name = "growthos.ai"
